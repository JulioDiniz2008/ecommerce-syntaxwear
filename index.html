<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tênis e Sneakers Online</title>
    <meta name="description"
        content="Compre os melhores tênis e sneakers online na SyntaxWear. Encontre os últimos lançamentos, estilos exclusivos e ofertas imperdíveis para homens e mulheres. Transforme seu estilo com nossos calçados de alta qualidade.">


    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/product-category.css">

</head>

<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
                <img src="./imagem/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu Secundário">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li class="icons">
                    <a href="#" aria-label="Minha conta" class="icon-link">
                        <img class="icon" src="./imagem/icons/user.svg" alt="Ícone de usuário">
                    </a>
                    <a href="#" aria-label="Ajuda" class="icon-link">
                        <img class="icon" src="./imagem/icons/help.svg" alt="Ícone de ajuda">
                    </a>
                    <a href="#" aria-label="Carrinho" class="icon-link">
                        <img class="icon" src="./imagem/icons/bag.svg" alt="Ícone de carrinho">
                    </a>
                </li>
            </ul>
        </nav>



    </header>

    <main>
        <section class="hero-section">
            <div class="hero-overlay">

                <div class="hero-content">
                    <span class="hero-subtitle">Krypto One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>

        </section>

        <section class="categories-section">

            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Casual</span>
                </a>
            </div>
            <div class="category-card esporte">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Esporte</span>
                </a>
            </div>

            <div class="category-card moderno">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Moderno</span>
                </a>
            </div>

            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Futurista</span>
                </a>
            </div>

        </section>

        <section class="featured-products">

        </section>
    </main>

    <footer>
        <div class="container footer__wrap"></div>
    </footer>
</body>

</html>
